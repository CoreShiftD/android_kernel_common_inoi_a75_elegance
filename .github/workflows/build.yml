name: Build INOI A750 Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cleanup / Free disk space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y bc build-essential curl python3 libssl-dev flex bison libelf-dev rsync zip

      - name: Setup swap
        run: |
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1G count=16 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h
          df -h .

      - name: Install repo tool
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo -o repo
          chmod +x repo
          sudo mv repo /usr/local/bin/

      - name: Sync kernel source
        env:
          GKI_MANIFEST_BRANCH: common-android12-5.10
          GKI_BRANCH: android12-5.10-2025-06
          SYNC_JOBS: "4"
        run: |
          set -euo pipefail

          mkdir -p kernel
          cd kernel

          init_help="$(repo init --help 2>&1 || true)"
          init_flags=()

          if grep -q -- '--depth' <<< "$init_help"; then
            init_flags+=(--depth=1)
          fi
          if grep -q -- '--partial-clone' <<< "$init_help"; then
            init_flags+=(--partial-clone)
          fi
          if grep -q -- '--clone-filter' <<< "$init_help"; then
            init_flags+=(--clone-filter=blob:none)
          fi

          repo init \
            -u https://android.googlesource.com/kernel/manifest \
            -b "$GKI_MANIFEST_BRANCH" \
            --quiet \
            "${init_flags[@]}"

          sync_jobs="${SYNC_JOBS:-4}"

          if ! repo sync \
            -c \
            --no-tags \
            --no-clone-bundle \
            --optimized-fetch \
            -j"${sync_jobs}"
          then
            echo "::warning::sync with optimized-fetch failed, retrying without it"
            repo sync \
              -c \
              --no-tags \
              --no-clone-bundle \
              -j"${sync_jobs}"
          fi

          echo "== pinning common to latest respin of $GKI_BRANCH (stays at 5.10.237) =="

          common_rel="$(
            repo list 2>/dev/null |
              awk -F' : ' '$2 == "kernel/common" { print $1; exit }'
          )"
          common_rel="${common_rel:-common}"

          if [ ! -d "$common_rel" ]; then
            echo "::error::kernel/common project not found at expected path '$common_rel'"
            echo "== repo list output for debugging =="
            repo list 2>/dev/null
            exit 1
          fi

          echo "kernel/common resolved to: $common_rel"
          cd "$common_rel"

          remote_name="$(git remote | head -n1)"
          if [ -z "$remote_name" ]; then
            echo "::error::no git remote configured in $common_rel"
            git remote -v
            exit 1
          fi
          echo "using remote: $remote_name"

          git fetch "$remote_name" "$GKI_BRANCH"
          git checkout FETCH_HEAD
          cd ..

      - name: Build GKI kernel
        run: |
          WORKSPACE="$GITHUB_WORKSPACE/kernel"
          cd "$WORKSPACE"
          export LTO=full
          BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh

      - name: Collect kernel image
        run: |
          WORKSPACE="$GITHUB_WORKSPACE/kernel"
          mkdir -p "$GITHUB_WORKSPACE/artifacts"

          OUT_DIR="$WORKSPACE/out/android12-5.10/dist"
          if [[ -d "$OUT_DIR" ]]; then
            cp "$OUT_DIR"/* "$GITHUB_WORKSPACE/artifacts/" 2>/dev/null || true
          else
            echo "Dist output directory not found at $OUT_DIR"
            exit 1
          fi

          if [[ ! -f "$OUT_DIR/Image" ]]; then
            echo "Image not found in $OUT_DIR"
            exit 1
          fi

      - name: Build and sign boot.img
        env:
          AVB_SIGNING_KEY: ${{ secrets.AVB_SIGNING_KEY }}
        run: |
          set -euo pipefail

          OUT_DIR="$GITHUB_WORKSPACE/kernel/out/android12-5.10/dist"

          # mkbootimg/unpack_bootimg from AOSP, and avbtool from external/avb
          git clone --depth=1 https://android.googlesource.com/platform/system/tools/mkbootimg "$GITHUB_WORKSPACE/mkbootimg"
          git clone --depth=1 https://android.googlesource.com/platform/external/avb "$GITHUB_WORKSPACE/avb"

          # Ramdisk extracted from stock boot.img (header v4, INOI A75)
          mkdir -p "$GITHUB_WORKSPACE/boot_unpack"
          cp "$GITHUB_WORKSPACE/.github/bootimg/ramdisk" "$GITHUB_WORKSPACE/boot_unpack/ramdisk"

          python3 "$GITHUB_WORKSPACE/mkbootimg/mkbootimg.py" \
            --header_version 4 \
            --os_version 12.0.0 \
            --os_patch_level 2099-12 \
            --kernel "$OUT_DIR/Image" \
            --ramdisk "$GITHUB_WORKSPACE/boot_unpack/ramdisk" \
            --cmdline '' \
            -o "$GITHUB_WORKSPACE/artifacts/boot.img"

          if [[ -z "${AVB_SIGNING_KEY:-}" ]]; then
            echo "::warning::AVB_SIGNING_KEY secret not set, skipping AVB signing"
            exit 0
          fi

          echo "$AVB_SIGNING_KEY" | base64 -d > "$GITHUB_WORKSPACE/avb_key.pem"

          python3 "$GITHUB_WORKSPACE/avb/avbtool.py" add_hash_footer \
            --image "$GITHUB_WORKSPACE/artifacts/boot.img" \
            --partition_name boot \
            --partition_size 67108864 \
            --key "$GITHUB_WORKSPACE/avb_key.pem" \
            --algorithm SHA256_RSA2048

          rm -f "$GITHUB_WORKSPACE/avb_key.pem"
          echo "Signed boot.img with AVB hash footer."

      - name: Pack with AnyKernel3
        run: |
          OUT_DIR="$GITHUB_WORKSPACE/kernel/out/android12-5.10/dist"

          git clone --depth=1 https://github.com/DikyVinus/AnyKernel3.git "$GITHUB_WORKSPACE/AnyKernel3"
          cd "$GITHUB_WORKSPACE/AnyKernel3"

          cp "$OUT_DIR/Image" .

          ZIP_NAME="AnyKernel3-GKI-$(date +'%Y%m%d-%H%M').zip"
          zip -r9 "$GITHUB_WORKSPACE/artifacts/$ZIP_NAME" . -x '.git*'

      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gki-kernel-aarch64
          path: artifacts/*

      - name: Set release tag
        id: tag
        run: echo "tag=gki-kernel-$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "GKI Kernel ${{ steps.tag.outputs.tag }}"
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}